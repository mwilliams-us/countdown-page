<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Countdown</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

   <div class="background">
        <img src="images/dahlia.png" class="flower" style="top:10%; left:20%; animation-delay:0s;">
        <img src="images/dahlia.png" class="flower" style="top:70%; left:10%; animation-delay:2s;">
        <img src="images/dahlia.png" class="flower" style="top:30%; left:80%; animation-delay:4s;">
        <img src="images/dahlia.png" class="flower" style="top:80%; left:60%; animation-delay:1s;">
   </div>
   
   <div class="container">
    <h1>T-Minus: Missouri Recon Visit</h1>
    <h3>June 5, 2026 at 8:00 AM (Central Time)</h3>
    <h2 id="timer"></h2>
   </div>

    <script>
        const targetDate = new Date("2026-06-05T13:00:00Z");

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById("timer").innerText = "Time reached.";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById("timer").innerText =
                `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
